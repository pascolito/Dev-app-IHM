<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/reset.css">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/variables.css">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/components.css">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/pages/profil/creer_un_compte.css">
</head>

<body>


    <div class="page_accueil">

        <div class="gauche">
            <div class="gauche_logo">
                <img src="/Projet-IHM-main/images/logo.png" alt="logo">

            </div>
            <div class="gauche_presentation">
                <div id="presentation_reseau_social">
                    <p>Enfin un réseau où tu n’es pas juste un <br /> pouce qui like 👍</p>
                </div>
            </div>

        </div>


        <div class="milieu">
            <span > <!--Délimmitation de la page /milieu -->
            </span>
        </div>
        <div class="droite"> <!--Partie drotie de la page -->
            <div class="formulaire">
                <h1>Inscription</h1>
                <form id="form-inscription">
                    <div id="top_inscription"><!--en haut de l'inscription  -->
                        <img id="preview_pdp" src="/Projet-IHM-main/images/profile_vide.png" alt="pdp"> <!--Preview de la photo de profile  -->

                        <div id="right_inscr"> <!--partie a droite de la preview -->
                            <input class="champ" id="nom" type="text" placeholder="Nom">

                            <input class="champ" id="prenom" type="text" placeholder="Prenom">

                            <label class="champ" id="pdplabel">
                                <input type="file" id="pdp" name="pdp" accept="image/png, image/jpeg">
                                Photo de profile
                            </label>
                        </div>
                    </div>

                    <!--en bas de l'inscription  -->
                    <input class="champ" id="mail" type="email" placeholder="Email">

                    <input class="champ" id="mot_de_passe" type="password" placeholder="Mot de passe">
                    <input class="champ" id="mot_de_passe_conf" type="password" placeholder="Confirmations du mot de passe">

                    <button class="btn" id="creation_compte" type="submit">
                        Creer le compte
                    </button>
                    <div id="erreur"></div>
                </form>
            </div>
        </div>

    </div>
    <div id="footer"></div>

    <script src="/Projet-IHM-main/pages/java/account.js"></script>
    <script>
        fetch('/Projet-IHM-main/pages/html/footer.html')
          .then(response => response.text())
          .then(data => {
            document.getElementById('footer').innerHTML = data;
          });
    </script>

</body>

</html>
