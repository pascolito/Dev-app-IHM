<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>

    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/reset.css">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/variables.css">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/components.css">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/pages/profil/connexion.css">
</head>

<body>


    <div class="page_accueil">

        <div class="gauche">
            <div class="gauche_logo">
                <img src="/Projet-IHM-main/images/logo.png" alt="logo">

            </div>
            <div class="gauche_presentation">
                <div id="presentation_reseau_social">
                    <p>Enfin un réseau où tu n’es pas juste un <br /> pouce qui like 👍</p>
                </div>
            </div>

        </div>

        <div class="milieu">
            <span class="barre_vertical"> <!--Délimmitation de la page /milieu --></span>
        </div>
        <div class="droite"> <!--Partie drotie de la page -->
            <div class="formulaire">
                <h1>Ravis de vous revoir !</h1>
                <form id="form-connexion">

                    <input class="champ" id="mail" type="text" placeholder="Email">
                    <input class="champ" id="mot_de_passe" type="password" placeholder="Mot de passe">
                    <button class="btn" id=connexion type="submit">
                        Se Connecter
                    </button>
                    <a href="/Projet-IHM-main/pages/html/profil/creer_un_compte.html">Pas encore inscrit ?</a>
                    <div id="erreur"></div>
                </form>
            </div>
        </div>

    </div>
    <div id="footer"></div>
    <script>
        fetch('/Projet-IHM-main/pages/html/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer').innerHTML = data;
            });
    </script>
    <script src="/Projet-IHM-main/pages/java/accountLogin.js"></script>

</body>

</html>
