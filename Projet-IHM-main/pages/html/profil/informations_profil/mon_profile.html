<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/reset.css">
  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/variables.css">
  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/components.css">
  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/pages/profil/informations_profil/mes_informations.css">
  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/pages/header.css">
  <title>Document</title>
</head>

<body>
  <header class="header">

    <div class="header_contenue">

      <div class="header_logo">
        <img src="/Projet-IHM-main/images/logo.png" alt="logo">
      </div>

      <form id="form-post" class="form-recherche">
        <div class="champ-recherche">
          <input list="liste-data" name="recherche" id="recherche" placeholder="Rechercher un post" />
          <datalist id="liste-data"></datalist>
        </div>

        <ul id="liste-resultats" class="resultats-recherche"></ul>
      </form>


      <!-- PLACEHOLDER USER A REMPLIR DANS LE CSS-->
      <div class="header_user">
        <img src="/Projet-IHM-main/images/profile_vide.png" alt="pdp" id="headerPdp">

        <p id="nomprenom">nom prenom</p>

        <button class="btn" id="DECONEXION">DECONEXION</button>
      </div>

    </div>

    <script src="/Projet-IHM-main/pages/java/header.js"></script>
  </header>


  <div id="button_onglet">

    <button class="btn" id="onglet_information" type="submit">
      Mes informations
    </button>

    <button class="btn" id="onglet_statistique" type="submit">
      Statistiques
    </button>

    <button class="btn" id="modifier_publication" type="submit">
      Mes publications
    </button>
  </div>
  <!--PARTIE DE GAUCHE -->
  <div id="mainContent">
    <div id="left">
      <div id="information">
        <div class="formulaire">
          <form id="form-modification">
            <div id="top_inscription"><!--en haut de l'inscription  -->
              <img id="preview_pdp" src="/Projet-IHM-main/images/profile_vide.png" alt="pdp">
              <!--Preview de la photo de profile  -->

              <div id="right_inscr"> <!--partie a droite de la preview -->
                <input class="champ" id="nom" type="text" placeholder="Nom">

                <input class="champ" id="prenom" type="text" placeholder="Prenom">

                <label class="champ" id="pdplabel">
                  <input type="file" id="pdp" name="pdp" accept="image/png, image/jpeg">
                  Photo de profile
                </label>
              </div>
            </div>

            <!--en bas de l'inscription  -->
            <input class="champ" id="mail" type="email" placeholder="Email">

            <input class="champ" id="mot_de_passe" type="password" placeholder="Mot de passe">
            <input class="champ" id="mot_de_passe_conf" type="password" placeholder="Confirmations du mot de passe">

            <button class="btn" id="modifier_information" type="submit">
              Modifier les information
            </button>

            <div id="erreur"></div>
          </form>
        </div>
      </div>

      <div id="publication">
        <div class="carte">
          <p class="carte_tag">#Les autres postes</p>
          <div class="carte_contenu">
            <div class="avatar">🙂</div>
            <div class="carte_texte">
              <p class="carte_auteur">nom prenom + Date de publication</p>
              <p>Texte publié par l'utilisateur si il ecrit qql chose</p>
              <div class="carte_image"></div>
            </div>
          </div>
          <div class="carte_footer">
            <span class="like">❤️</span>
            <button class="btn_supprimer">Supprimer</button>
          </div>
        </div>
      </div>

    </div>
    <!--PARTIE DE DROITE -->
    <div id="right">
      <div class="statistiques">
        <h3>Statistiques</h3>
        <div class="stat-item">
          <span class="stat-label">Likes</span>
          <span class="stat-value">4.2k</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Abonnés</span>
          <span class="stat-value">1.8k</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Suivis</span>
          <span class="stat-value">342</span>

        </div>
      </div>
    </div>
  </div>

  <script src="/Projet-IHM-main/pages/java/page_profile/profile.js"></script>
</body>

</html>
