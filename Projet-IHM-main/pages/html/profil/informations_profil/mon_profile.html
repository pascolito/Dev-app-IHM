<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/reset.css">
  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/variables.css">
  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/components.css">
  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/pages/profil/informations_profil/mes_informations.css">
  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/pages/header.css">
  <link rel="stylesheet" href="/Projet-IHM-main/pages/css/pages/file_d'actualite.css">


  <title>Profile</title>
</head>

<header class="header">

  <div class="header_contenue">

    <div class="header_logo">
      <img src="/Projet-IHM-main/images/logo.png" alt="logo">
    </div>

    <form id="form-post" class="form-recherche">
      <div class="champ-recherche">
        <input list="liste-data" name="recherche" id="recherche" placeholder="Rechercher un post" />
        <datalist id="liste-data"></datalist>
      </div>

      <ul id="liste-resultats" class="resultats-recherche"></ul>
    </form>


    <!-- PLACEHOLDER USER A REMPLIR DANS LE CSS-->
    <div class="header_user">
      <img src="/Projet-IHM-main/images/profile_vide.png" alt="pdp" id="headerPdp">

      <button class="btn_neutre" id="nomprenom"
        onclick="window.location.href='/Projet-IHM-main/pages/html/profil/informations_profil/mon_profile.html';"></button>

      <button class="btn" id="DECONEXION">Déconnexion</button>
    </div>

  </div>

  <script src="/Projet-IHM-main/pages/java/header.js"></script>
</header>

<body>

  <div id="retour">
    <a href="/Projet-IHM-main/pages/html/file_d'actualite.html">← Retour file d'actualité</a>
  </div>
  <div id="button_onglet">

    <button class="btn" id="onglet_information">
      Mes informations
    </button>

    <button class="btn" id="onglet_statistique">
      Statistiques
    </button>

    <button class="btn" id="modifier_publication">
      Mes publications
    </button>
  </div>
  <!--PARTIE DE GAUCHE -->
  <div id="mainContent">
    <div id="left">

      <div id="information">
        <div class="formulaire">
          <form id="form-modification">
            <div id="top_inscription"><!--en haut de l'inscription  -->
              <img id="preview_pdp" src="/Projet-IHM-main/images/profile_vide.png" alt="pdp">
              <!--Preview de la photo de profile  -->

              <div id="right_inscr"> <!--partie a droite de la preview -->
                <input class="champ" id="nom" type="text" placeholder="Nom">

                <input class="champ" id="prenom" type="text" placeholder="Prenom">

                <label class="champ" id="pdplabel">
                  <input type="file" id="pdp" name="pdp" accept="image/png, image/jpeg">
                  Photo de profile
                </label>
              </div>
            </div>

            <!--en bas de l'inscription  -->
            <input class="champ" id="mail" type="email" placeholder="Email">

            <input class="champ" id="mot_de_passe" type="password" placeholder="Mot de passe actuelle">
            <input class="champ" id="mot_de_passe_conf" type="password" placeholder="Nouveau mot de passe">

            <button class="btn" id="modifier_information" type="submit">
              Modifier les information
            </button>

            <div id="erreur"></div>
          </form>
        </div>
      </div>


      <div id="publication">
        <ul id="postsListeCurrentAccount"></ul>
      </div>
    </div>
    <!-- Fermeture de left -->

    <!--PARTIE DE DROITE -->
    <div id="statistiques">
      <div id="right">
        <div class="statistiques">
          <h3>Statistiques</h3>
          <div class="stat-item">
            <span class="stat-label">Likes</span>
            <span class="stat-value" id="nblikes"></span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Nombre de postes liké</span>
            <span class="stat-value" id="nbPostlikes"></span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Nombre de publications</span>
            <span class="stat-value" id="nbPost"></span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Abonnés</span>
            <span class="stat-value" id="nbabonee"></span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Suivis</span>
            <span class="stat-value" id="nbsuivis"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/Projet-IHM-main/pages/java/page_profile/profile.js"></script>
  <script src="/Projet-IHM-main/pages/java/page_profile/modifierProfile.js"></script>
  <script src="/Projet-IHM-main/pages/java/statistiques/statistiques.js"></script>
  <script src="/Projet-IHM-main/pages/java/publications/afficherPostProfile.js"></script>

</body>

</html>
