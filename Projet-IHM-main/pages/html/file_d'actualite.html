<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/reset.css">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/variables.css">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/components.css">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/pages/file_d'actualite.css">
    <link rel="stylesheet" href="/Projet-IHM-main/pages/css/pages/header.css">
    <title>File d'actualité</title>
</head>

<header class="header">

    <div class="header_contenue">

        <div class="header_logo">
            <img src="/Projet-IHM-main/images/logo.png" alt="logo">
        </div>

        <form id="form-post" class="form-recherche">
            <div class="champ-recherche">
                <input list="liste-data" name="recherche" id="recherche" placeholder="Rechercher un post" />
                <datalist id="liste-data"></datalist>
            </div>

            <ul id="#" class="resultats-recherche"></ul>
        </form>


        <!-- PLACEHOLDER USER A REMPLIR DANS LE CSS-->
        <div class="header_user">
            <img src="/Projet-IHM-main/images/profile_vide.png" alt="pdp" id="headerPdp">
            <button class="btn_neutre" id="nomprenom"
                onclick="window.location.href='/Projet-IHM-main/pages/html/profil/informations_profil/mon_profile.html';"></button>

            <button class="btn" id="DECONEXION">Déconnexion</button>
        </div>

    </div>

    <script src="/Projet-IHM-main/pages/java/header.js"></script>
</header>


<body>

    <div class="page_actualite">

        <!--Partie gauche de la page -->
        <div class="extremite">

            <div class="quete">
                <h3>Quêtes du jour</h3>

                <div class="stat-item">
                    <span class="stat-label">Liker un post</span>
                    <span class="stat-value">0/1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Publier une image</span>
                    <span class="stat-value">0/1</span>

                </div>
                <div class="stat-item">
                    <span class="stat-label">Commentez la publication d'un autre utilisateur</span>
                    <span class="stat-value">0/1</span>
                </div>
            </div>



            <div class="statistiques">
                <h3>Statistiques</h3>
                <div class="stat-item">
                    <span class="stat-label">Likes</span>
                    <span class="stat-value">4.2k</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Abonnés</span>
                    <span class="stat-value" id="nbabonee"></span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Suivis</span>
                    <span class="stat-value" id="nbsuivis"></span>

                </div>
            </div>
        </div>



        <!--Partie mileu de la page -->
        <div class="actualite_principale">

            <!-- Onglets -->
            <div class="onglets">
                <button class="btn" onclick="window.location.href='#';"> Pour toi</button>
                <button class="btn" onclick="window.location.href='#';">Suivis</button>
            </div>

            <div class="middle-panel">
                <div class="post create">
                    <form id="form-poste">
                        <div class="post-top">
                            <div class="dp">
                                <img src="" alt="">
                            </div>
                            <textarea id="post-Text" type="text" placeholder="What's on your mind?" /></textarea>
                        </div>

                        <div class="post-bottom">

                            <label class="champ" id="pdplabel">
                                <input type="file" id="img" name="img" accept="image/png, image/jpeg">
                                Image/Photo
                            </label>
                            <div class="action">
                                <button class="btn" id="poster" type="submit">
                                    Poster
                                </button>
                            </div>
                        </div>
                    </form>
                </div>


                <ul id="postsListe">

                </ul>

            </div>


        </div>

        <!--Partie droite de la page -->
        <div class="extremite">
            <div class="bloc-utilisateurs">
                <h3 class="titre-section">Utilisateurs</h3>

                <p class="infos-utilisateurs">
                    Utilisateur trouvé : <span id="total-utilisateurs">0</span>
                </p>

                <div class="barre-recherche"></div>

                <form id="form-utilisateur" class="form-recherche">
                    <div class="champ-recherche">
                        <input name="recherche-utilisateur" id="recherche-utilisateur" type="text"
                            placeholder="Rechercher un utilisateur" />

                        <datalist id="liste-data"></datalist>
                    </div>

                    <ul id="liste-utilisateur-resultats" class="resultats-recherche"></ul>
                </form>
            </div>
        </div>

        <script src="/Projet-IHM-main/pages/java/barre_de_recherche/recherche_utilisateur.js"></script>
        <script src="/Projet-IHM-main/pages/java/utilisateur_suivis.js"></script>
        <script src="/Projet-IHM-main/pages/java/statistiques.js"></script>

        <script src="/Projet-IHM-main/pages/java/publication.js"></script>
        <script src="/Projet-IHM-main/pages/java/like.js"></script>
        <script src="/Projet-IHM-main/pages/java/afficherPostes.js"></script>

        <script src="/Projet-IHM-main/pages/java/commentaires.js"></script>

        <script>
            fetch('/Projet-IHM-main/pages/html/footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer').innerHTML = data;
                });
        </script>
</body>

</html>
