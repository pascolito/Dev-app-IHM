<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="/pages/css/style.css">
</head>

<body>
 

    <div class="page_accueil">

        <div class="gauche">
            <div class="gauche_logo"> 
                <img src="/images/logo.png" alt="logo">
                
            </div>
            <div class="gauche_presentation">
                <div id="presentation_reseau_social">
                    <p>Enfin un réseau où tu n’es pas juste un <br/> pouce qui like 👍</p>
                </div>
            </div>

        </div>

        <div class="milieu">
            <span > <!--Délimmitation de la page /milieu --></span>
        </div>
        <div class="droite"> <!--Partie drotie de la page -->
            <div class="formulaire">
                <h1>Ravis de vous revoir !</h1>
                <form>

                    <input class="champ" id="mail" type="text" placeholder="Email">
                    <input class="champ" id="mot_de_passe" type="text" placeholder="Mot de passe">
                    <button id=connexion type="button">
                        Se Connecter
                    </button>
                </form>
            </div>
        </div>

    </div>
    <div id="footer"></div>

    <script>
    fetch('../../pages/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;
      });
    </script>
</body>

</html>
